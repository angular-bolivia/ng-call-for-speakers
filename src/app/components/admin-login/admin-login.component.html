<div class="login-wrapper animate-fade-in">
  <div class="login-container card-glass">
    <div class="login-header">
      <img src="/ng-logo.svg" alt="Angular Logo" class="angular-logo-sm">
      <h2>Acceso Administradores</h2>
      <p>Angular Bolivia Call for Speakers</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="admin@angular.bo"
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
      </div>

      <div *ngIf="errorMessage()" class="error-message">
        {{ errorMessage() }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading()">
        <span *ngIf="!isLoading()">Ingresar</span>
        <span *ngIf="isLoading()" class="spinner"></span>
      </button>

      <div class="login-footer">
        <a routerLink="/">← Volver al inicio</a>
      </div>
    </form>
  </div>
</div>
