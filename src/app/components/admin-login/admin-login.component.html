<div class="login-wrapper animate-fade-in">
  <div class="login-container card-glass">
    <div class="login-header">
      <svg class="angular-logo-sm" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
        <path d="M125 30 L219 63 L204 186 L125 230 L46 186 L31 63 Z" fill="#b80025"/>
        <path d="M125 30 L125 230 L204 186 L219 63 Z" fill="#dd0031"/>
        <path d="M125 55 L65 175 L90 175 L102 145 L148 145 L160 175 L185 175 Z" fill="#ffffff"/>
        <path d="M125 55 L125 120 L144 120 L136 100 Z" fill="#e0e0e0"/>
        <path d="M125 55 L125 120 L106 120 L114 100 Z" fill="#ffffff"/>
      </svg>
      <h2>Acceso Administradores</h2>
      <p>Angular Bolivia Call for Speakers</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="admin@angular.bo"
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
      </div>

      <div *ngIf="errorMessage()" class="error-message">
        {{ errorMessage() }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading()">
        <span *ngIf="!isLoading()">Ingresar</span>
        <span *ngIf="isLoading()" class="spinner"></span>
      </button>

      <div class="login-footer">
        <a routerLink="/">← Volver al inicio</a>
      </div>
    </form>
  </div>
</div>
